<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>专业股票交易系统 - 调试模式</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #2962FF; margin-bottom: 30px; }
        .section { margin: 20px 0; padding: 15px; border-left: 4px solid #2962FF; background-color: #f8f9ff; }
        .button { background-color: #2962FF; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .button:hover { background-color: #1e4bd8; }
        .status { padding: 10px; border-radius: 5px; margin: 10px 0; }
        .success { background-color: #e8f5e9; color: #2e7d32; }
        .error { background-color: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>专业股票交易系统</h1>
            <p>Professional Stock Trading System</p>
        </div>
        <div class="section">
            <h2>系统状态</h2>
            <div id="status" class="status success">系统运行正常</div>
        </div>
        <div class="section">
            <h2>测试功能</h2>
            <button class="button" onclick="testHealth()">健康检查</button>
            <button class="button" onclick="testRegister()">测试注册</button>
            <button class="button" onclick="testLogin()">测试登录</button>
            <div id="testResults"></div>
        </div>
    </div>
    <script>
        async function testHealth(){
            try{const r=await fetch('/api/health');const d=await r.json();
                document.getElementById('testResults').innerHTML = `<div class="status success">健康检查: ${JSON.stringify(d)}</div>`}
            catch(e){document.getElementById('testResults').innerHTML = `<div class="status error">错误: ${e.message}</div>`}
        }
        async function testRegister(){
            const u='test'+Math.random().toString(36).slice(2,6);
            const data={username:u,email:'test@example.com',password:'testpass123',password_confirm:'testpass123'};
            try{const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const d=await r.json();
                document.getElementById('testResults').innerHTML = `<div class="status ${d.success?'success':'error'}">注册: ${JSON.stringify(d)}</div>`}
            catch(e){document.getElementById('testResults').innerHTML = `<div class="status error">注册错误: ${e.message}</div>`}
        }
        async function testLogin(){
            const data={username:'testuser',password:'testpass123'};
            try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const d=await r.json();
                document.getElementById('testResults').innerHTML = `<div class="status ${d.success?'success':'error'}">登录: ${JSON.stringify(d)}</div>`}
            catch(e){document.getElementById('testResults').innerHTML = `<div class="status error">登录错误: ${e.message}</div>`}
        }
    </script>
</body>
</html>
